name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        run: mvn test

  push-to-ecr:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: target

      - name: Configure AWS ECR credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Docker image to Amazon ECR
        run: |
          PROJECT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          PROJECT_NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)

          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY=my-space/inventory
          IMAGE_TAG=${PROJECT_NAME}-${PROJECT_VERSION}

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  deploy-to-ecs:
    runs-on: ubuntu-latest
    needs: push-to-ecr
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Update ECS task definition
        run: |
          PROJECT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          PROJECT_NAME=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          
          IMAGE_TAG=${PROJECT_NAME}-${PROJECT_VERSION}
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.eu-west-1.amazonaws.com
          IMAGE_URI=$ECR_REGISTRY/my-space/inventory:$IMAGE_TAG
          
          # Download current task definition, stripping read-only fields
          aws ecs describe-task-definition \
            --task-definition order-service-task \
            --region eu-west-1 \
            --query taskDefinition \
            --output json \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
            > task-definition.json
          
          # Update the image in task definition
          sed -i "s|IMAGE_URI_PLACEHOLDER|$IMAGE_URI|g" task-definition.json
          
          # Register new task definition
          aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --region eu-west-1

      - name: Create or update ECS service
        run: |
          # Get the ARN of the newly registered task definition
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition order-service \
            --region eu-west-1 \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          # Check if the service already exists
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ecommerce \
            --services order-service \
            --region eu-west-1 \
            --query "services[0].status" \
            --output text)

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "Service exists, updating..."
            aws ecs update-service \
              --cluster ecommerce \
              --service order-service \
              --task-definition $TASK_DEF_ARN \
              --force-new-deployment \
              --region eu-west-1
          else
            echo "Service not found, creating..."
            aws ecs create-service \
              --cluster ecommerce \
              --service-name order-service \
              --task-definition $TASK_DEF_ARN \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-0e76dd00c815478c6,subnet-021bdc931a968fbf2,subnet-0edc0d97f2eb3af56],securityGroups=[sg-0c04f8311092b9142],assignPublicIp=ENABLED}" \
              --region eu-west-1
          fi